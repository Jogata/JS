    <div class="container">
      <div class="logo">
        <a href="#"><img src="./assets/nat-geo-wild-img/logo.png" alt="logo" /></a>
      </div>
      <div class="content">
        <h1>Log in to the world of Wild</h1>
        <div class="tabs">
          <button class="tab-btn active" data-tab="1">Log In</button>
          <span></span>
          <button class="tab-btn" data-tab="2">Sign Up</button>
        </div>
        <div class="tabs-panel">
          <div class="panel active" data-panel="1">
            <form action="/">
              <div class="input-group">
                <input type="email" placeholder=" " />
                <label for="email">Email</label>
              </div>
              <div class="input-group">
                <input type="password" id="login-password" placeholder=" " />
                <label for="login-password">Password</label>
                <span id="login-password-eye">
                  <i class="ri-eye-off-fill"></i>
                </span>
              </div>
              <button>Log In</button>
              <p>or</p>
              <a href="#">Forgot your password?</a>
            </form>
          </div>
          <div class="panel" data-panel="2">
            <form action="/">
              <div class="input-group">
                <input type="email" placeholder=" " />
                <label for="email">Email</label>
              </div>
              <div class="input-group">
                <input type="password" id="signup-password" placeholder=" " />
                <label for="signup-password">Password</label>
                <span id="signup-password-eye">
                  <i class="ri-eye-off-fill"></i>
                </span>
              </div>
              <div class="input-group">
                <input type="password" id="confirm-password" placeholder=" " />
                <label for="confirm-password">Confirm Password</label>
                <span id="confirm-password-eye">
                  <i class="ri-eye-off-fill"></i>
                </span>
              </div>
              <button>Sign Up</button>
              <p>or</p>
              <a href="#">Already have an account? <span> Login</span></a>
            </form>
          </div>
        </div>
      </div>
      <div class="image"></div>
    </div>

    <script>
      const tabList = document.querySelector(".tabs");
      
      tabList.addEventListener("click", (e) => {
        if (e.target.classList.contains("active")) return;
      
        const tabIndex = e.target.dataset.tab;
        if (!tabIndex) return;
      
        const tabs = document.querySelectorAll("[data-tab]");
        Array.from(tabs).forEach((tab) => {
          if (tab.dataset.tab === tabIndex) {
            tab.classList.add("active");
          } else {
            tab.classList.remove("active");
          }
        });
      
        const activePanel = document.querySelector(".panel.active");
        const toActivePanel = document.querySelector(`[data-panel="${tabIndex}"]`);
        activePanel.classList.add("close");
        activePanel.addEventListener(
          "animationend",
          (e) => {
            activePanel.classList.remove("active");
            activePanel.classList.remove("close");
            toActivePanel.classList.add("active");
          },
          {
            once: true,
          }
        );
      });

      const showHidePasswords = (type) => {
        const passwordButton = document.getElementById(`${type}-password-eye`);

        passwordButton.addEventListener("click", (e) => {
          const passwordInput = document.getElementById(`${type}-password`);
          const icon = passwordButton.querySelector("i");
          const isVisible = icon.classList.contains("ri-eye-fill");
          passwordInput.type = isVisible ? "password" : "text";
          icon.setAttribute("class", isVisible ? "ri-eye-off-fill" : "ri-eye-fill");
        });
      };
      
      showHidePasswords("login");
      showHidePasswords("signup");
      showHidePasswords("confirm");        
    </script>

    <div id="calc" style="padding: 5rem; display: block;">
      <input type="number" id="width">
      <input type="number" id="height" placeholder="Height" style="padding: 0.5em;">
      <button id="calc" style="padding: 0.5em; border: 1px solid;">Calc</button>
      <p id="new-width" style="padding: 0.5em; color: tomato;">
        New width: <span id="right"></span> <span id="left"></span>
      </p>
      <!-- <p id="new-height" style="color: tomato;">New height: <span></span></p> -->
      <script>
        const button = document.getElementById("calc");
        button.addEventListener("click", () => {
          const width = document.getElementById("width").value;
          const height = document.getElementById("height").value;
          console.log(height);
          const k = 1294/2048;
          const newWidth = Number(height) * k;
          document.querySelector("#left").textContent = newWidth;
          document.querySelector("#right").textContent = width - ((width - newWidth)/2);
        })
      </script>
    </div>
    <script>
      // Create Query String as String
      const queryStringSample = 'name=Dom&age=36&occupation=Software+Developer';
      // Create URLSearchParams Object from String
      const uspFromString = new URLSearchParams(queryStringSample);
      console.log(uspFromString);

      // Create Query String as Object
      const queryStringSampleAsObject = { 
        name: 'Dom',
        age: 36,
        occupation: 'Software Developer',
      };

      // Create URLSearchParams Object from Object
      const uspFromObject = new URLSearchParams(queryStringSampleAsObject);

      // Get Param from URLSearchParams
      const name = uspFromObject.get('name');
      console.log(`Value of 'name': ${name}`);

      // Change Param in URLSearchParams
      uspFromObject.set('name', 'New Name');
      // Set New Param in URLSearchParams
      uspFromObject.set('programming language', 'JavaScript');

      for (const [key, value] of uspFromObject) {
        console.log(`${key} => ${value}`);
      }

      // Convert URLSearchParams Object to Query String
      console.log(uspFromString.toString());
      console.log(uspFromObject.toString());
    </script>
